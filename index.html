<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Hayot Ventures — Заявка</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{
    --teal-deep:#1F5B57; --teal:#2E6E6A; --teal-slate:#44827F; --teal-light:#5FA8A4;
    --coral:#E8835A; --ink:#1A1D1F; --bg:#F1F6F5; --card:#FFFFFF;
    --muted:#6B7C7A; --line:#E2ECEA; --ok:#2E9E6B; --shadow:0 8px 30px rgba(31,91,87,.10);
    --radius:18px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,Inter,sans-serif;
    background:
      radial-gradient(1200px 500px at 50% -10%, rgba(95,168,164,.18), transparent 60%),
      var(--bg);
    color:var(--ink); min-height:100vh; -webkit-font-smoothing:antialiased;
    padding:0 0 40px;
  }
  .wrap{max-width:520px;margin:0 auto;padding:0 18px;}

  /* ---------- header ---------- */
  header{padding:18px 18px 8px;max-width:520px;margin:0 auto;display:flex;align-items:center;gap:12px;}
  .logo{width:42px;height:42px;flex:none;}
  .brand{display:flex;flex-direction:column;line-height:1.1;}
  .brand b{font-size:18px;font-weight:800;letter-spacing:-.2px;}
  .brand span{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;}
  .langs{margin-left:auto;display:flex;gap:6px;}
  .lang{font-size:12px;font-weight:700;color:var(--muted);background:#fff;border:1px solid var(--line);
    border-radius:999px;padding:6px 10px;cursor:pointer;transition:.2s;}
  .lang.active{color:#fff;background:var(--teal);border-color:var(--teal);}

  /* ---------- progress hexagons ---------- */
  .progress{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin:14px 0 18px;}
  .hex{width:14px;height:16px;clip-path:polygon(50% 0,100% 25%,100% 75%,50% 100%,0 75%,0 25%);
    background:var(--line);transition:.3s;}
  .hex.done{background:var(--teal-light);}
  .hex.current{background:var(--coral);transform:scale(1.18);}

  /* ---------- card ---------- */
  .card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
    padding:22px 20px;border:1px solid var(--line);animation:rise .35s ease;}
  @keyframes rise{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
  .step-num{font-size:12px;font-weight:700;color:var(--teal-light);letter-spacing:1px;text-transform:uppercase;}
  .q{font-size:20px;font-weight:800;margin:6px 0 4px;letter-spacing:-.3px;line-height:1.25;}
  .hint{font-size:13px;color:var(--muted);margin-bottom:16px;}

  input,textarea{width:100%;font-size:16px;font-family:inherit;color:var(--ink);background:#fff;
    border:1.5px solid var(--line);border-radius:14px;padding:14px;outline:none;transition:.2s;}
  input:focus,textarea:focus{border-color:var(--teal-light);box-shadow:0 0 0 4px rgba(95,168,164,.14);}
  textarea{min-height:110px;resize:vertical;}

  .chips{display:flex;flex-direction:column;gap:10px;}
  .chip{display:flex;align-items:center;gap:12px;border:1.5px solid var(--line);background:#fff;
    border-radius:14px;padding:14px;font-size:15px;font-weight:600;cursor:pointer;transition:.18s;}
  .chip .dot{width:18px;height:20px;flex:none;clip-path:polygon(50% 0,100% 25%,100% 75%,50% 100%,0 75%,0 25%);
    background:var(--line);transition:.18s;}
  .chip.sel{border-color:var(--teal);background:#F2FAF8;}
  .chip.sel .dot{background:var(--coral);}

  .err{color:var(--coral);font-size:13px;font-weight:600;margin-top:10px;min-height:16px;}

  /* ---------- nav ---------- */
  .nav{display:flex;gap:10px;margin-top:18px;}
  .btn{flex:1;border:none;border-radius:14px;padding:15px;font-size:16px;font-weight:800;
    cursor:pointer;font-family:inherit;transition:.2s;}
  .btn-primary{background:var(--teal-deep);color:#fff;}
  .btn-primary:active{transform:scale(.98);}
  .btn-ghost{flex:none;width:54px;background:#fff;color:var(--teal);border:1.5px solid var(--line);}
  .btn-coral{background:var(--coral);color:#fff;}

  /* ---------- review ---------- */
  .rev-row{display:flex;justify-content:space-between;gap:14px;padding:11px 0;border-bottom:1px solid var(--line);}
  .rev-row:last-child{border-bottom:none;}
  .rev-row .k{color:var(--muted);font-size:13px;font-weight:600;flex:none;}
  .rev-row .v{font-size:14px;font-weight:600;text-align:right;word-break:break-word;}

  /* ---------- success ---------- */
  .done-screen{text-align:center;padding:34px 22px;}
  .done-screen .big-hex{width:84px;height:84px;margin:0 auto 18px;}
  .done-screen h2{font-size:24px;font-weight:800;margin:0 0 8px;}
  .done-screen p{color:var(--muted);font-size:15px;line-height:1.5;}
  .appid{display:inline-block;margin-top:14px;background:#F2FAF8;border:1px dashed var(--teal-light);
    color:var(--teal-deep);font-weight:800;padding:10px 16px;border-radius:12px;letter-spacing:1px;}
  .hidden{display:none;}
  .footer{text-align:center;color:var(--muted);font-size:11px;margin-top:18px;letter-spacing:.3px;}
</style>
</head>
<body>

<header>
  <!-- Гексагон-вертушка Hayot Ventures -->
  <svg class="logo" viewBox="0 0 100 100" aria-hidden="true">
    <g>
      <polygon points="50,8 70,20 70,44 50,56 30,44 30,20" fill="#1F5B57"/>
      <polygon points="92,50 92,74 72,86 52,74 52,50 72,38" fill="#E8835A"/>
      <polygon points="50,92 30,80 30,56 50,44 70,56 70,80" fill="#2E6E6A"/>
      <polygon points="8,50 8,26 28,14 48,26 48,50 28,62" fill="#5FA8A4"/>
    </g>
  </svg>
  <div class="brand">
    <b>Hayot Ventures</b>
    <span data-i="brand_sub">Pre-Seed фонд</span>
  </div>
  <div class="langs">
    <div class="lang" data-lang="ru">RU</div>
    <div class="lang" data-lang="en">EN</div>
    <div class="lang" data-lang="uz">UZ</div>
  </div>
</header>

<div class="wrap">
  <div class="progress" id="progress"></div>
  <div id="screen"></div>
  <div class="footer">⬡ Hayot Ventures · Invest in products, not ideas</div>
</div>

<script>
const tg = window.Telegram ? window.Telegram.WebApp : null;
if (tg){ tg.ready(); tg.expand(); }

/* ---------------- словари ---------------- */
const SECTORS = {
  fintech:{ru:"FinTech и платежи",en:"FinTech & Payments",uz:"FinTech va to‘lovlar"},
  ecom:{ru:"E-commerce / маркетплейсы / МСБ",en:"E-commerce / SME tools",uz:"E-commerce / KО‘B"},
  edu:{ru:"EdTech и HR-Tech",en:"EdTech & HR-Tech",uz:"EdTech va HR-Tech"},
  health:{ru:"HealthTech и InsurTech",en:"HealthTech & InsurTech",uz:"HealthTech va InsurTech"},
  ai:{ru:"AI/ML и B2B SaaS",en:"AI/ML & B2B SaaS",uz:"AI/ML va B2B SaaS"},
  agri:{ru:"AgriTech / логистика",en:"AgriTech / Logistics",uz:"AgriTech / logistika"},
  other:{ru:"Другое технологическое",en:"Other technology",uz:"Boshqa texnologiya"}
};
const STAGES = {
  idea:{ru:"Идея / прототип",en:"Idea / prototype",uz:"G‘oya / prototip"},
  mvp:{ru:"Работающий MVP",en:"Working MVP",uz:"Ishlaydigan MVP"},
  traction:{ru:"MVP + первые клиенты",en:"MVP + early traction",uz:"MVP + birinchi mijozlar"},
  revenue:{ru:"Есть выручка",en:"Has revenue",uz:"Daromad bor"}
};
const L = {
  brand_sub:{ru:"Pre-Seed фонд",en:"Pre-Seed fund",uz:"Pre-Seed fond"},
  next:{ru:"Далее →",en:"Next →",uz:"Keyingi →"},
  back:{ru:"←",en:"←",uz:"←"},
  submit:{ru:"Отправить заявку",en:"Submit application",uz:"Arizani yuborish"},
  required:{ru:"Пожалуйста, заполните это поле",en:"Please fill in this field",uz:"Iltimos, ushbu maydonni to‘ldiring"},
  tooShort:{ru:"Добавьте чуть больше деталей",en:"Add a bit more detail",uz:"Biroz batafsilroq yozing"},
  badContact:{ru:"Укажите корректный телефон или email",en:"Enter a valid phone or email",uz:"To‘g‘ri telefon yoki email kiriting"},
  pick:{ru:"Выберите вариант",en:"Pick an option",uz:"Variantni tanlang"},
  reviewTitle:{ru:"Проверьте заявку",en:"Review application",uz:"Arizani tekshiring"},
  done_h:{ru:"Заявка отправлена!",en:"Application submitted!",uz:"Ariza yuborildi!"},
  done_p:{ru:"Наша команда рассмотрит проект в течение нескольких рабочих дней и свяжется с вами. Спасибо за доверие к Hayot Ventures!",
          en:"Our team will review the project within a few business days and get back to you. Thank you for trusting Hayot Ventures!",
          uz:"Jamoamiz loyihani bir necha ish kunida ko‘rib chiqadi va siz bilan bog‘lanadi. Hayot Ventures’ga ishonganingiz uchun rahmat!"},
  q:{
    name:{ru:"Как вас зовут?",en:"What's your name?",uz:"Ismingiz?"},
    startup:{ru:"Название стартапа",en:"Startup name",uz:"Startap nomi"},
    sector:{ru:"Сектор продукта",en:"Product sector",uz:"Mahsulot sohasi"},
    stage:{ru:"Стадия проекта",en:"Project stage",uz:"Loyiha bosqichi"},
    desc:{ru:"Проблема и решение",en:"Problem & solution",uz:"Muammo va yechim"},
    traction:{ru:"Какие есть результаты?",en:"What traction do you have?",uz:"Qanday natijalar bor?"},
    country:{ru:"Основной рынок (страна)",en:"Main market (country)",uz:"Asosiy bozor (mamlakat)"},
    team:{ru:"Размер команды",en:"Team size",uz:"Jamoa hajmi"},
    amount:{ru:"Запрашиваемая сумма",en:"Requested amount",uz:"So‘ralayotgan summa"},
    contact:{ru:"Контакт для связи",en:"Contact details",uz:"Bog‘lanish ma’lumoti"},
    deck:{ru:"Ссылка на презентацию",en:"Pitch deck link",uz:"Taqdimot havolasi"}
  },
  hint:{
    name:{ru:"Имя и фамилия основателя",en:"Founder's full name",uz:"Asoschi ism-familiyasi"},
    startup:{ru:"Как называется ваш продукт",en:"Name of your product",uz:"Mahsulotingiz nomi"},
    sector:{ru:"К чему ближе всего ваш продукт",en:"Closest match for your product",uz:"Mahsulotingizga eng mos soha"},
    stage:{ru:"Мы инвестируем в продукты, а не идеи",en:"We invest in products, not ideas",uz:"Biz g‘oyaga emas, mahsulotga sarmoya kiritamiz"},
    desc:{ru:"2–4 предложения: какую проблему решаете и как",en:"2–4 sentences: the problem and your solution",uz:"2–4 gap: muammo va yechimingiz"},
    traction:{ru:"Пользователи, выручка, контракты, рост. Если нет — напишите «нет»",en:"Users, revenue, contracts, growth. If none — write “none”",uz:"Foydalanuvchi, daromad, shartnoma, o‘sish. Bo‘lmasa — «yo‘q»"},
    country:{ru:"Где работает проект",en:"Where the project operates",uz:"Loyiha qayerda ishlaydi"},
    team:{ru:"Сколько человек: фаундеры и сотрудники",en:"Founders + staff",uz:"Asoschilar + xodimlar"},
    amount:{ru:"В USD. Наш чек: $10 000 – $50 000",en:"In USD. Our check: $10,000 – $50,000",uz:"USD da. Bizning chek: $10 000 – $50 000"},
    contact:{ru:"Телефон или email",en:"Phone or email",uz:"Telefon yoki email"},
    deck:{ru:"Google Drive / ссылка. Можно пропустить — приложите файл боту позже",en:"Google Drive / link. Optional — you can send the file to the bot later",uz:"Google Drive / havola. Ixtiyoriy — faylni keyin botga yuborishingiz mumkin"}
  },
  rev:{
    name:{ru:"Основатель",en:"Founder",uz:"Asoschi"}, startup:{ru:"Стартап",en:"Startup",uz:"Startap"},
    sector:{ru:"Сектор",en:"Sector",uz:"Soha"}, stage:{ru:"Стадия",en:"Stage",uz:"Bosqich"},
    desc:{ru:"Описание",en:"Summary",uz:"Tavsif"}, traction:{ru:"Результаты",en:"Traction",uz:"Natijalar"},
    country:{ru:"Страна",en:"Country",uz:"Mamlakat"}, team:{ru:"Команда",en:"Team",uz:"Jamoa"},
    amount:{ru:"Запрос",en:"Ask",uz:"So‘rov"}, contact:{ru:"Контакт",en:"Contact",uz:"Aloqa"},
    deck:{ru:"Презентация",en:"Deck",uz:"Taqdimot"}
  }
};

/* ---------------- состояние ---------------- */
let lang = (tg && tg.initDataUnsafe && tg.initDataUnsafe.user && tg.initDataUnsafe.user.language_code) || "ru";
if(!["ru","en","uz"].includes(lang)) lang = "ru";

const FIELDS = ["name","startup","sector","stage","desc","traction","country","team","amount","contact","deck"];
const data = {};
let step = 0;

/* ---------------- рендер ---------------- */
function tr(o){ return o[lang] || o.ru; }

function renderProgress(){
  const p = document.getElementById("progress");
  p.innerHTML = "";
  FIELDS.forEach((_,i)=>{
    const h=document.createElement("div");
    h.className="hex"+(i<step?" done":"")+(i===step?" current":"");
    p.appendChild(h);
  });
}

function setLang(l){
  lang=l;
  document.querySelectorAll(".lang").forEach(e=>e.classList.toggle("active",e.dataset.lang===l));
  document.querySelector('[data-i="brand_sub"]').textContent=tr(L.brand_sub);
  render();
}

function field(){
  const f=FIELDS[step];
  const num=step+1, total=FIELDS.length;
  let body="";
  if(f==="sector"||f==="stage"){
    const src=f==="sector"?SECTORS:STAGES;
    body=`<div class="chips">`+Object.keys(src).map(k=>
      `<div class="chip${data[f]===k?" sel":""}" data-k="${k}"><span class="dot"></span>${tr(src[k])}</div>`
    ).join("")+`</div>`;
  } else if(f==="desc"||f==="traction"){
    body=`<textarea id="inp" placeholder="">${data[f]||""}</textarea>`;
  } else {
    const type=f==="amount"||f==="team"?'inputmode="numeric"':(f==="contact"?'inputmode="text"':'');
    body=`<input id="inp" ${type} value="${(data[f]||"").replace(/"/g,'&quot;')}" placeholder="">`;
  }
  return `<div class="card">
    <div class="step-num">${num} / ${total}</div>
    <div class="q">${tr(L.q[f])}</div>
    <div class="hint">${tr(L.hint[f])}</div>
    ${body}
    <div class="err" id="err"></div>
    <div class="nav">
      ${step>0?`<button class="btn btn-ghost" id="back">${tr(L.back)}</button>`:""}
      <button class="btn btn-primary" id="next">${step===total-1?tr(L.submit):tr(L.next)}</button>
    </div>
  </div>`;
}

function review(){
  const rows=FIELDS.map(f=>{
    let v=data[f]||"—";
    if(f==="sector") v=data[f]?tr(SECTORS[data[f]]):"—";
    if(f==="stage")  v=data[f]?tr(STAGES[data[f]]):"—";
    return `<div class="rev-row"><span class="k">${tr(L.rev[f])}</span><span class="v">${v}</span></div>`;
  }).join("");
  return `<div class="card">
    <div class="step-num">${tr(L.reviewTitle)}</div>
    <div class="q">⬡ ${data.startup||""}</div>
    <div style="margin:10px 0 4px">${rows}</div>
    <div class="nav">
      <button class="btn btn-ghost" id="back">${tr(L.back)}</button>
      <button class="btn btn-coral" id="send">${tr(L.submit)}</button>
    </div>
  </div>`;
}

function success(){
  return `<div class="card done-screen">
    <svg class="big-hex" viewBox="0 0 100 100">
      <polygon points="50,8 70,20 70,44 50,56 30,44 30,20" fill="#1F5B57"/>
      <polygon points="92,50 92,74 72,86 52,74 52,50 72,38" fill="#E8835A"/>
      <polygon points="50,92 30,80 30,56 50,44 70,56 70,80" fill="#2E6E6A"/>
      <polygon points="8,50 8,26 28,14 48,26 48,50 28,62" fill="#5FA8A4"/>
    </svg>
    <h2>${tr(L.done_h)}</h2>
    <p>${tr(L.done_p)}</p>
  </div>`;
}

const EMAIL=/[^@\s]+@[^@\s]+\.[^@\s]+/;
const PHONE=/[\+\d][\d\-\(\)\s]{6,}/;

function validate(){
  const f=FIELDS[step];
  if(f==="deck") return true; // optional
  const v=(data[f]||"").trim();
  const err=document.getElementById("err");
  if((f==="sector"||f==="stage")){ if(!v){err.textContent=tr(L.pick);return false;} return true; }
  if(!v){ err.textContent=tr(L.required); return false; }
  if(f==="desc" && v.length<15){ err.textContent=tr(L.tooShort); return false; }
  if(f==="contact" && !(EMAIL.test(v)||PHONE.test(v))){ err.textContent=tr(L.badContact); return false; }
  return true;
}

function bind(){
  const f=FIELDS[step];
  const inp=document.getElementById("inp");
  if(inp){ inp.addEventListener("input",e=>data[f]=e.target.value); setTimeout(()=>inp.focus(),60); }
  document.querySelectorAll(".chip").forEach(c=>c.addEventListener("click",()=>{
    data[f]=c.dataset.k;
    document.querySelectorAll(".chip").forEach(x=>x.classList.remove("sel"));
    c.classList.add("sel");
  }));
  const back=document.getElementById("back");
  if(back) back.addEventListener("click",()=>{step--;render();});
  const next=document.getElementById("next");
  if(next) next.addEventListener("click",()=>{
    if(!validate()) return;
    if(step<FIELDS.length-1){ step++; render(); }
    else { step=FIELDS.length; render(); } // review
  });
  const send=document.getElementById("send");
  if(send) send.addEventListener("click",submit);
}

function render(){
  const total=FIELDS.length;
  renderProgress();
  const scr=document.getElementById("screen");
  if(step<total) scr.innerHTML=field();
  else if(step===total) scr.innerHTML=review();
  else scr.innerHTML=success();
  bind();
  window.scrollTo(0,0);
}

function submit(){
  const payload={lang};
  FIELDS.forEach(f=>payload[f]=(data[f]||"").trim());
  if(tg){
    tg.HapticFeedback && tg.HapticFeedback.notificationOccurred("success");
    tg.sendData(JSON.stringify(payload));   // -> уходит боту
    step=total_done(); render();
    setTimeout(()=>tg.close(), 1800);
  } else {
    step=total_done(); render(); // предпросмотр в обычном браузере
  }
}
function total_done(){ return FIELDS.length+1; }

/* init */
document.querySelectorAll(".lang").forEach(e=>e.addEventListener("click",()=>setLang(e.dataset.lang)));
setLang(lang);
</script>
</body>
</html>
