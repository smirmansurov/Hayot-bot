<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Hayot Ventures — Apply</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
  :root{
    --teal:#0F7A7A; --teal-accent:#2F9E9B; --teal-light:#D7E8E8;
    --orange:#F5A05A; --ink:#101820; --bg:#F5F6F7; --card:#FFFFFF;
    --muted:#5E6E6E; --dim:#93A3A3; --line:#E4EBEB;
    --serif:"Playfair Display",Georgia,serif;
    --sans:"Manrope",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    --radius:18px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
  html,body{min-height:100%;}
  body{
    font-family:var(--sans); color:var(--ink); background:var(--bg);
    min-height:100vh; -webkit-font-smoothing:antialiased; padding:0 0 46px; position:relative; overflow-x:hidden;
  }
  /* фоновые плавающие гексагоны (венчурный мотив роста/сети) */
  .bg-hex{position:fixed;z-index:0;opacity:.05;pointer-events:none;animation:float 14s ease-in-out infinite;}
  .bg-hex.a{top:8%;right:-30px;width:160px;color:var(--teal);animation-delay:0s;}
  .bg-hex.b{top:46%;left:-40px;width:190px;color:var(--orange);opacity:.045;animation-delay:-5s;}
  .bg-hex.c{bottom:4%;right:-20px;width:130px;color:var(--teal-accent);animation-delay:-9s;}
  @keyframes float{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-22px) rotate(8deg)}}
  .wrap{max-width:520px;margin:0 auto;padding:0 18px;position:relative;z-index:1;}

  header{max-width:520px;margin:0 auto;padding:18px 18px 4px;display:flex;align-items:center;gap:11px;position:relative;z-index:1;}
  .logo{height:26px;width:auto;display:block;}
  .langs{margin-left:auto;display:flex;gap:5px;}
  .lang{font-size:11px;font-weight:700;color:var(--muted);background:#fff;border:1px solid var(--line);
    border-radius:999px;padding:6px 11px;cursor:pointer;transition:.22s;}
  .lang.active{color:#fff;background:var(--teal);border-color:var(--teal);box-shadow:0 4px 12px rgba(15,122,122,.28);}

  .progress{display:flex;gap:5px;justify-content:center;flex-wrap:wrap;margin:16px 0 18px;}
  .hex{width:13px;height:15px;clip-path:polygon(50% 0,100% 25%,100% 75%,50% 100%,0 75%,0 25%);
    background:var(--teal-light);transition:.35s cubic-bezier(.3,1.4,.5,1);}
  .hex.done{background:var(--teal-accent);}
  .hex.current{background:var(--orange);transform:scale(1.25);animation:beat 1.3s ease-in-out infinite;}
  @keyframes beat{0%,100%{transform:scale(1.25)}50%{transform:scale(1.55)}}

  /* hero */
  .hero{animation:fadeUp .5s ease both;}
  .pill{display:inline-flex;align-items:center;gap:8px;font-size:12px;font-weight:700;color:var(--teal);
    background:var(--teal-light);border-radius:999px;padding:7px 14px;margin:4px 0 18px;letter-spacing:.2px;}
  .pill .dot{width:8px;height:8px;border-radius:50%;background:var(--orange);box-shadow:0 0 0 0 rgba(245,160,90,.5);animation:ring 1.8s infinite;}
  @keyframes ring{0%{box-shadow:0 0 0 0 rgba(245,160,90,.5)}70%{box-shadow:0 0 0 9px rgba(245,160,90,0)}100%{box-shadow:0 0 0 0 rgba(245,160,90,0)}}
  .hero h1{font-family:var(--serif);font-size:33px;line-height:1.14;font-weight:800;letter-spacing:-.3px;color:var(--ink);margin-bottom:14px;}
  .hero h1 .em{font-style:italic;color:var(--teal);}
  .hero p{color:var(--muted);font-size:15px;line-height:1.62;margin-bottom:20px;}

  /* венчурный growth-график */
  .chart{background:linear-gradient(180deg,#fff,#FBFDFD);border:1px solid var(--line);border-radius:16px;
    padding:16px 16px 10px;margin-bottom:22px;box-shadow:0 10px 30px rgba(15,122,122,.06);}
  .chart .ct{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;}
  .chart .ct b{font-size:13px;font-weight:700;color:var(--ink);}
  .chart .ct span{font-size:12px;font-weight:700;color:var(--teal);}
  .grow-line{stroke:var(--teal);stroke-width:3;fill:none;stroke-linecap:round;
    stroke-dasharray:320;stroke-dashoffset:320;animation:draw 1.8s .3s ease forwards;}
  @keyframes draw{to{stroke-dashoffset:0}}
  .grow-dot{fill:var(--orange);opacity:0;animation:dotIn .4s 1.9s ease forwards;}
  @keyframes dotIn{to{opacity:1}}
  .grow-bar{fill:var(--teal-light);transform-origin:bottom;transform:scaleY(0);animation:barUp .6s ease forwards;}
  @keyframes barUp{to{transform:scaleY(1)}}

  .stats{display:flex;gap:10px;margin-bottom:24px;}
  .stat{flex:1;background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px 8px;text-align:center;animation:fadeUp .5s both;}
  .stat:nth-child(1){animation-delay:.1s}.stat:nth-child(2){animation-delay:.18s}.stat:nth-child(3){animation-delay:.26s}
  .stat b{display:block;font-family:var(--sans);font-size:18px;font-weight:800;color:var(--teal);letter-spacing:-.2px;}
  .stat span{font-size:11px;color:var(--ink);opacity:.65;line-height:1.3;display:block;margin-top:5px;font-weight:700;letter-spacing:.2px;}

  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:23px 20px;box-shadow:0 10px 30px rgba(16,24,32,.05);animation:fadeUp .4s ease both;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  .step-num{font-size:11px;font-weight:800;color:var(--teal-accent);letter-spacing:1.5px;text-transform:uppercase;}
  .q{font-family:var(--serif);font-size:24px;font-weight:700;margin:8px 0 4px;letter-spacing:-.2px;line-height:1.24;color:var(--ink);}
  .hint{font-size:13px;color:var(--muted);margin-bottom:16px;line-height:1.5;}

  input,textarea{width:100%;font-size:16px;font-family:var(--sans);color:var(--ink);background:#fff;
    border:1.5px solid var(--line);border-radius:13px;padding:14px;outline:none;transition:.22s;}
  input::placeholder,textarea::placeholder{color:var(--dim);}
  input:focus,textarea:focus{border-color:var(--teal-accent);box-shadow:0 0 0 4px rgba(47,158,155,.14);}
  textarea{min-height:108px;resize:vertical;}

  .chips{display:flex;flex-direction:column;gap:9px;}
  .chip{display:flex;align-items:center;gap:12px;border:1.5px solid var(--line);background:#fff;
    border-radius:13px;padding:13px 14px;font-size:15px;font-weight:600;color:var(--ink);cursor:pointer;
    transition:.2s;animation:fadeUp .35s both;}
  .chip:active{transform:scale(.985);}
  .chip .dot{width:16px;height:18px;flex:none;clip-path:polygon(50% 0,100% 25%,100% 75%,50% 100%,0 75%,0 25%);
    background:var(--teal-light);transition:.2s;}
  .chip.sel{border-color:var(--teal);background:#F0F8F8;box-shadow:0 6px 18px rgba(15,122,122,.12);}
  .chip.sel .dot{background:var(--orange);transform:scale(1.15) rotate(15deg);}

  .err{color:#C8552B;font-size:13px;font-weight:600;margin-top:10px;min-height:16px;}

  .nav{display:flex;gap:10px;margin-top:18px;}
  .btn{flex:1;border:none;border-radius:13px;padding:15px;font-size:16px;font-weight:800;cursor:pointer;
    font-family:var(--sans);transition:.2s;position:relative;overflow:hidden;}
  .btn:active{transform:scale(.98);}
  .btn-primary{background:var(--teal);color:#fff;box-shadow:0 8px 22px rgba(15,122,122,.32);}
  .btn-primary::after{content:"";position:absolute;top:0;left:-120%;width:60%;height:100%;
    background:linear-gradient(120deg,transparent,rgba(255,255,255,.35),transparent);animation:shine 3.2s infinite;}
  @keyframes shine{0%{left:-120%}45%,100%{left:160%}}
  .btn-coral{background:var(--orange);color:#3A1D08;box-shadow:0 8px 22px rgba(245,160,90,.36);}
  .btn-ghost{flex:none;width:54px;background:#fff;color:var(--teal);border:1.5px solid var(--line);}
  .btn-block{width:100%;}

  .rev-row{display:flex;justify-content:space-between;gap:14px;padding:11px 0;border-bottom:1px solid var(--line);animation:fadeUp .3s both;}
  .rev-row:last-child{border-bottom:none;}
  .rev-row .k{color:var(--muted);font-size:13px;font-weight:600;flex:none;}
  .rev-row .v{font-size:14px;font-weight:700;text-align:right;word-break:break-word;}

  .done-screen{text-align:center;padding:30px 22px;}
  .done-screen .seal{width:96px;height:96px;margin:0 auto 18px;position:relative;}
  .done-screen .seal svg{width:100%;height:100%;}
  .seal .ring{stroke:var(--teal-light);stroke-width:4;fill:none;}
  .seal .prog{stroke:var(--teal);stroke-width:4;fill:none;stroke-linecap:round;stroke-dasharray:283;stroke-dashoffset:283;animation:draw2 .9s .2s ease forwards;}
  @keyframes draw2{to{stroke-dashoffset:0}}
  .seal .tick{stroke:var(--orange);stroke-width:5;fill:none;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:48;stroke-dashoffset:48;animation:draw3 .4s 1s ease forwards;}
  @keyframes draw3{to{stroke-dashoffset:0}}
  .done-screen h2{font-family:var(--serif);font-size:26px;font-weight:800;margin-bottom:10px;letter-spacing:-.2px;}
  .done-screen p{color:var(--muted);font-size:15px;line-height:1.55;}
  .hidden{display:none;}
  .footer{text-align:center;color:var(--dim);font-size:10.5px;margin-top:20px;letter-spacing:.4px;font-weight:600;}
</style>
</head>

<div class="wrap">
  <div class="progress hidden" id="progress"></div>
  <div id="screen"></div>

</div>

<script>
const tg = window.Telegram ? window.Telegram.WebApp : null;
if (tg){ tg.ready(); tg.expand(); try{tg.setHeaderColor("#F5F6F7"); tg.setBackgroundColor("#F5F6F7");}catch(e){} }

const SECTORS = {
  fintech:{ru:"Финтех",en:"Fintech",uz:"Fintech"},
  ai:{ru:"AI / ML",en:"AI / ML",uz:"AI / ML"},
  saas:{ru:"SaaS",en:"SaaS",uz:"SaaS"},
  marketplace:{ru:"Маркетплейс",en:"Marketplace",uz:"Marketpleys"},
  web3:{ru:"Web3 / Блокчейн",en:"Web3 / Blockchain",uz:"Web3 / Blokcheyn"},
  enterprise:{ru:"Enterprise Tech",en:"Enterprise Tech",uz:"Enterprise Tech"},
  health:{ru:"HealthTech",en:"HealthTech",uz:"HealthTech"},
  edu:{ru:"EdTech",en:"EdTech",uz:"EdTech"},
  other:{ru:"Другое",en:"Other",uz:"Boshqa"}
};
const STAGES = {
  idea:{ru:"Идея",en:"Idea",uz:"G‘oya"},
  mvp:{ru:"MVP",en:"MVP",uz:"MVP"},
  preseed:{ru:"Pre-Seed",en:"Pre-Seed",uz:"Pre-Seed"},
  seed:{ru:"Seed",en:"Seed",uz:"Seed"}

const L = {
  pill:{ru:"Сейчас принимаем заявки",en:"Now accepting applications",uz:"Hozir arizalar qabul qilinmoqda"},
  hero1:{ru:"Мы инвестируем",en:"We invest in",uz:"Biz kelajakni"},
  hero2:{ru:"в идеи",en:"ideas",uz:"o‘zgartiradigan"},
  hero3:{ru:"которые меняют будущее",en:"that shape the future",uz:"g‘oyalarga sarmoya kiritamiz"},
  heroP:{ru:"За каждым большим продуктом стоит смелая идея. Если у вас есть такая — расскажите нам. Hayot Ventures даёт капитал, экспертизу и сеть, чтобы превратить идею в компанию.",
         en:"Behind every great product is a bold idea. If you have one — tell us. Hayot Ventures provides capital, expertise and the network to turn an idea into a company.",
         uz:"Har bir buyuk mahsulot ortida jasur g‘oya turadi. Agar sizda shunday g‘oya bo‘lsa — bizga ayting. Hayot Ventures g‘oyani kompaniyaga aylantirish uchun kapital, tajriba va tarmoq beradi."},
  chartT:{ru:"Путь основателя",en:"Founder's journey",uz:"Asoschi yo‘li"},
  chartV:{ru:"Идея → Компания",en:"Idea → Company",uz:"G‘oya → Kompaniya"},
  s1n:{ru:"Pre-Seed",en:"Pre-Seed",uz:"Pre-Seed"}, s1l:{ru:"стадия",en:"stage",uz:"bosqich"},
  s2n:{ru:"$10–50K",en:"$10–50K",uz:"$10–50K"}, s2l:{ru:"первый чек",en:"first check",uz:"birinchi chek"},
  s3n:{ru:"5 дней",en:"5 days",uz:"5 kun"}, s3l:{ru:"на ответ",en:"to respond",uz:"javobga"},
  start:{ru:"Подать заявку →",en:"Apply now →",uz:"Ariza topshirish →"},
  next:{ru:"Далее →",en:"Next →",uz:"Keyingi →"},
  back:{ru:"←",en:"←",uz:"←"},
  submit:{ru:"Отправить заявку",en:"Submit application",uz:"Arizani yuborish"},
  required:{ru:"Пожалуйста, заполните это поле",en:"Please fill in this field",uz:"Iltimos, ushbu maydonni to‘ldiring"},
  tooShort:{ru:"Добавьте чуть больше деталей",en:"Add a bit more detail",uz:"Biroz batafsilroq yozing"},
  badContact:{ru:"Укажите корректный телефон или email",en:"Enter a valid phone or email",uz:"To‘g‘ri telefon yoki email kiriting"},
  pick:{ru:"Выберите вариант",en:"Pick an option",uz:"Variantni tanlang"},
  reviewTitle:{ru:"Проверьте заявку",en:"Review application",uz:"Arizani tekshiring"},
  done_h:{ru:"Заявка отправлена!",en:"Application submitted!",uz:"Ariza yuborildi!"},
  done_p:{ru:"Спасибо за доверие. Мы рассмотрим вашу идею в течение 5 рабочих дней. Номер заявки и проверка статуса придут в чат с ботом.",
          en:"Thank you for your trust. We'll review your idea within 5 business days. Your application ID and status check will arrive in the bot chat.",
          uz:"Ishonchingiz uchun rahmat. G‘oyangizni 5 ish kunida ko‘rib chiqamiz. Ariza raqami va holat tekshiruvi bot chatiga keladi."},
  addhome:{ru:"📲 Добавить Hayot на экран",en:"📲 Add Hayot to home screen",uz:"📲 Hayot’ni ekranga qo‘shish"},
  q:{
    name:{ru:"Как вас зовут?",en:"Founder name",uz:"Asoschi ismi"},
    startup:{ru:"Название проекта",en:"Project name",uz:"Loyiha nomi"},
    sector:{ru:"Индустрия",en:"Industry",uz:"Industriya"},
    stage:{ru:"Стадия проекта",en:"Project stage",uz:"Loyiha bosqichi"},
    desc:{ru:"Расскажите об идее",en:"Tell us about the idea",uz:"G‘oya haqida ayting"},
    traction:{ru:"Какие есть результаты?",en:"What traction do you have?",uz:"Qanday natijalar bor?"},
    country:{ru:"Основной рынок",en:"Main market",uz:"Asosiy bozor"},
    team:{ru:"Размер команды",en:"Team size",uz:"Jamoa hajmi"},
    amount:{ru:"Запрашиваемая сумма",en:"Investment amount",uz:"So‘ralayotgan summa"},
    contact:{ru:"Email или телефон",en:"Email or phone",uz:"Email yoki telefon"},
    deck:{ru:"Pitch deck (ссылка)",en:"Pitch deck (link)",uz:"Pitch deck (havola)"}
  },
  hint:{
    name:{ru:"Имя и фамилия основателя",en:"Founder's full name",uz:"Asoschi ism-familiyasi"},
    startup:{ru:"Как называется ваш проект",en:"Name of your project",uz:"Loyihangiz nomi"},
    sector:{ru:"К чему ближе всего ваша идея",en:"Closest match for your idea",uz:"G‘oyangizga eng mos soha"},
    stage:{ru:"На какой стадии проект сейчас",en:"Current stage of the project",uz:"Loyihaning hozirgi bosqichi"},
    desc:{ru:"2–4 предложения: какую проблему решаете и как",en:"2–4 sentences: the problem and your solution",uz:"2–4 gap: muammo va yechimingiz"},
    traction:{ru:"Пользователи, выручка, рост. Если пока нет — «нет»",en:"Users, revenue, growth. If none yet — “none”",uz:"Foydalanuvchi, daromad, o‘sish. Hali bo‘lmasa — «yo‘q»"},
    country:{ru:"Где будет работать проект",en:"Where the project will operate",uz:"Loyiha qayerda ishlaydi"},
    team:{ru:"Сколько человек в команде",en:"People on the team",uz:"Jamoadagi odamlar soni"},
    amount:{ru:"В USD. Наш чек: $10 000 – $50 000",en:"In USD. Our check: $10,000 – $50,000",uz:"USD da. Bizning chek: $10 000 – $50 000"},
    contact:{ru:"Для обратной связи",en:"For us to contact you",uz:"Siz bilan bog‘lanish uchun"},
    deck:{ru:"Google Drive / ссылка. Можно пропустить и прислать файл боту",en:"Google Drive / link. Optional — send the file to the bot",uz:"Google Drive / havola. Ixtiyoriy — faylni botga yuboring"}
  },
  rev:{
    name:{ru:"Основатель",en:"Founder",uz:"Asoschi"}, startup:{ru:"Проект",en:"Project",uz:"Loyiha"},
    sector:{ru:"Индустрия",en:"Industry",uz:"Industriya"}, stage:{ru:"Стадия",en:"Stage",uz:"Bosqich"},
    desc:{ru:"Идея",en:"Idea",uz:"G‘oya"}, traction:{ru:"Результаты",en:"Traction",uz:"Natijalar"},
    country:{ru:"Рынок",en:"Market",uz:"Bozor"}, team:{ru:"Команда",en:"Team",uz:"Jamoa"},
    amount:{ru:"Запрос",en:"Ask",uz:"So‘rov"}, contact:{ru:"Контакт",en:"Contact",uz:"Aloqa"},
    deck:{ru:"Презентация",en:"Deck",uz:"Taqdimot"}
  }
};

let lang = (tg && tg.initDataUnsafe && tg.initDataUnsafe.user && tg.initDataUnsafe.user.language_code) || "ru";
if(!["ru","en","uz"].includes(lang)) lang = "ru";

const FIELDS = ["name","startup","sector","stage","desc","traction","country","team","amount","contact","deck"];
const data = {};
let screen = "intro";

function tr(o){ return o[lang] || o.ru; }

function renderProgress(){
  const p=document.getElementById("progress");
  if(typeof screen!=="number"){ p.classList.add("hidden"); return; }
  p.classList.remove("hidden"); p.innerHTML="";
  FIELDS.forEach((_,i)=>{
    const h=document.createElement("div");
    h.className="hex"+(i<screen?" done":"")+(i===screen?" current":"");
    p.appendChild(h);
  });
}

function setLang(l){
  lang=l;
  document.querySelectorAll(".lang").forEach(e=>e.classList.toggle("active",e.dataset.lang===l));
  render();
}

function intro(){
  return `<div class="hero">
    <div class="pill"><span class="dot"></span>${tr(L.pill)}</div>
    <h1>${tr(L.hero1)} <span class="em">${tr(L.hero2)}</span>, ${tr(L.hero3)}</h1>
    <p>${tr(L.heroP)}</p>
    <div class="chart">
      <div class="ct"><b>${tr(L.chartT)}</b><span>${tr(L.chartV)} ↗</span></div>
      <svg viewBox="0 0 320 110" width="100%" height="96" preserveAspectRatio="none" aria-hidden="true">
        <rect class="grow-bar" x="22"  y="78" width="20" height="26" rx="3" style="animation-delay:.2s"/>
        <rect class="grow-bar" x="92"  y="62" width="20" height="42" rx="3" style="animation-delay:.45s"/>
        <rect class="grow-bar" x="162" y="44" width="20" height="60" rx="3" style="animation-delay:.7s"/>
        <rect class="grow-bar" x="232" y="20" width="20" height="84" rx="3" style="animation-delay:.95s"/>
        <polyline class="grow-line" points="14,90 84,72 154,52 224,30 300,10"/>
        <circle class="grow-dot" cx="300" cy="10" r="6"/>
      </svg>
    </div>
    <div class="stats">
      <div class="stat"><b>${tr(L.s1n)}</b><span>${tr(L.s1l)}</span></div>
      <div class="stat"><b>${tr(L.s2n)}</b><span>${tr(L.s2l)}</span></div>
      <div class="stat"><b>${tr(L.s3n)}</b><span>${tr(L.s3l)}</span></div>
    </div>
    <button class="btn btn-coral btn-block" id="go">${tr(L.start)}</button>
    <button class="btn btn-ghost btn-block" id="addhome" style="display:none;margin-top:10px;">${tr(L.addhome)}</button>
  </div>`;
}

function field(){
  const f=FIELDS[screen], num=screen+1, total=FIELDS.length;
  let body="";
  if(f==="sector"||f==="stage"){
    const src=f==="sector"?SECTORS:STAGES;
    body=`<div class="chips">`+Object.keys(src).map((k,i)=>
      `<div class="chip${data[f]===k?" sel":""}" data-k="${k}" style="animation-delay:${i*0.04}s"><span class="dot"></span>${tr(src[k])}</div>`
    ).join("")+`</div>`;
  } else if(f==="desc"||f==="traction"){
    body=`<textarea id="inp">${data[f]||""}</textarea>`;
  } else {
    const im=(f==="amount"||f==="team")?'inputmode="numeric"':'';
    body=`<input id="inp" ${im} value="${(data[f]||"").replace(/"/g,'&quot;')}">`;
  }
  return `<div class="card">
    <div class="step-num">${num} / ${total}</div>
    <div class="q">${tr(L.q[f])}</div>
    <div class="hint">${tr(L.hint[f])}</div>
    ${body}
    <div class="err" id="err"></div>
    <div class="nav">
      <button class="btn btn-ghost" id="back">${tr(L.back)}</button>
      <button class="btn btn-primary" id="next">${screen===total-1?tr(L.submit):tr(L.next)}</button>
    </div>
  </div>`;
}

function review(){
  const rows=FIELDS.map((f,i)=>{
    let v=data[f]||"—";
    if(f==="sector") v=data[f]?tr(SECTORS[data[f]]):"—";
    if(f==="stage")  v=data[f]?tr(STAGES[data[f]]):"—";
    return `<div class="rev-row" style="animation-delay:${i*0.03}s"><span class="k">${tr(L.rev[f])}</span><span class="v">${v}</span></div>`;
  }).join("");
  return `<div class="card">
    <div class="step-num">${tr(L.reviewTitle)}</div>
    <div class="q">${data.startup||""}</div>
    <div style="margin:12px 0 4px">${rows}</div>
    <div class="nav">
      <button class="btn btn-ghost" id="back">${tr(L.back)}</button>
      <button class="btn btn-coral" id="send">${tr(L.submit)}</button>
    </div>
  </div>`;
}

function done(){
  return `<div class="card done-screen">
    <div class="seal">
      <svg viewBox="0 0 100 100">
        <circle class="ring" cx="50" cy="50" r="45"/>
        <circle class="prog" cx="50" cy="50" r="45" transform="rotate(-90 50 50)"/>
        <polyline class="tick" points="32,52 44,64 68,38"/>
      </svg>
    </div>
    <h2>${tr(L.done_h)}</h2>
    <p>${tr(L.done_p)}</p>
  </div>`;
}

const EMAIL=/[^@\s]+@[^@\s]+\.[^@\s]+/;
const PHONE=/[\+\d][\d\-\(\)\s]{6,}/;

function validate(){
  const f=FIELDS[screen];
  if(f==="deck") return true;
  const v=(data[f]||"").trim();
  const err=document.getElementById("err");
  if(f==="sector"||f==="stage"){ if(!v){err.textContent=tr(L.pick);return false;} return true; }
  if(!v){ err.textContent=tr(L.required); return false; }
  if(f==="desc" && v.length<15){ err.textContent=tr(L.tooShort); return false; }
  if(f==="contact" && !(EMAIL.test(v)||PHONE.test(v))){ err.textContent=tr(L.badContact); return false; }
  return true;
}

function bind(){
  const go=document.getElementById("go");
  if(go) go.addEventListener("click",()=>{ haptic("light"); screen=0; render(); });
  if(typeof screen==="number"){
    const f=FIELDS[screen];
    const inp=document.getElementById("inp");
    if(inp){ inp.addEventListener("input",e=>data[f]=e.target.value); setTimeout(()=>inp.focus(),60); }
    document.querySelectorAll(".chip").forEach(c=>c.addEventListener("click",()=>{
      haptic("light"); data[f]=c.dataset.k;
      document.querySelectorAll(".chip").forEach(x=>x.classList.remove("sel"));
      c.classList.add("sel");
    }));
    const back=document.getElementById("back");
    if(back) back.addEventListener("click",()=>{ screen = screen===0 ? "intro" : screen-1; render(); });
    const next=document.getElementById("next");
    if(next) next.addEventListener("click",()=>{
      if(!validate()){ haptic("error"); return; }
      haptic("light");
      screen = screen<FIELDS.length-1 ? screen+1 : "review";
      render();
    });
  }
  const send=document.getElementById("send");
  if(send) send.addEventListener("click",submit);
  if(screen==="review"){
    const b=document.getElementById("back");
    if(b) b.addEventListener("click",()=>{ screen=FIELDS.length-1; render(); });
  }
  // «Добавить на домашний экран» — только если Telegram поддерживает (Bot API 8.0+)
  const ah=document.getElementById("addhome");
  if(ah && tg && typeof tg.addToHomeScreen==="function"){
    let ok=true;
    try{ ok = !tg.isVersionAtLeast || tg.isVersionAtLeast("8.0"); }catch(e){}
    if(ok){
      ah.style.display="block";
      ah.addEventListener("click",()=>{ try{ tg.addToHomeScreen(); }catch(e){} });
    }
  }
}

function haptic(type){
  try{
    if(!tg||!tg.HapticFeedback) return;
    if(type==="error") tg.HapticFeedback.notificationOccurred("error");
    else tg.HapticFeedback.impactOccurred("light");
  }catch(e){}
}

function render(){
  renderProgress();
  const scr=document.getElementById("screen");
  if(screen==="intro") scr.innerHTML=intro();
  else if(typeof screen==="number") scr.innerHTML=field();
  else if(screen==="review") scr.innerHTML=review();
  else scr.innerHTML=done();
  bind();
  window.scrollTo(0,0);
}

function submit(){
  const payload={lang};
  FIELDS.forEach(f=>payload[f]=(data[f]||"").trim());
  if(tg){
    try{ tg.HapticFeedback && tg.HapticFeedback.notificationOccurred("success"); }catch(e){}
    tg.sendData(JSON.stringify(payload));
    screen="done"; render();
    setTimeout(()=>tg.close(), 2200);
  } else {
    screen="done"; render();
  }
}

document.querySelectorAll(".lang").forEach(e=>e.addEventListener("click",()=>setLang(e.dataset.lang)));
setLang(lang);
</script>
</body>
